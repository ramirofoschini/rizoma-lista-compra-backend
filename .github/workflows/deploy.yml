name: Despliegue automatico a AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código
        uses: actions/checkout@v3

      - name: 2. Configurar Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Dar permisos al wrapper de Maven
        run: chmod +x mvnw

      - name: 4. Compilar el proyecto (Crear el .jar)
        run: ./mvnw clean package -DskipTests

      - name: 5. Enviar el .jar al servidor por SSH (SCP)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/"

      - name: 6. Apagar app vieja y arrancar la nueva
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Buscar la app Java que está corriendo y matarla
            PID=$(pgrep -f "java -jar app.jar") || true
            if [ -n "$PID" ]; then
              kill -9 $PID
            fi
            
            # Mover el archivo nuevo a la carpeta principal y renombrarlo
            mv /home/ubuntu/target/*.jar /home/ubuntu/app.jar
            rm -rf /home/ubuntu/target
            
            # Encender el sistema con nohup y tu script mágico
            nohup ./start.sh > app.log 2>&1 &