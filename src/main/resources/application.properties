spring.application.name=pedidos

# --- Datasource (Neon Postgres). En prod se setean por variables de entorno. ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rizoma}
spring.datasource.username=${DB_USER:rizoma}
spring.datasource.password=${DB_PASSWORD:rizoma}

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=America/Argentina/Buenos_Aires

# --- Flyway (crea y versiona el esquema + seed inicial) ---
spring.flyway.enabled=true

# --- Credenciales del panel admin (CAMBIAR en producción vía env) ---
app.admin.username=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASSWORD:rizoma-admin}

# --- CORS: orígenes permitidos del frontend Angular ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200}

# --- WhatsApp de Rizoma (destino del pedido). Formato internacional sin +. ---
app.whatsapp.destino=${WHATSAPP_DESTINO:5492215346770}

# --- Server (Render inyecta PORT) ---
server.port=${PORT:8080}

# --- Tamaño máximo del Excel de carga masiva ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
